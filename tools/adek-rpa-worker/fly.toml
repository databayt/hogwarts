# Fly.io deployment for the ADEK RPA worker.
# One process group: a long-lived poller that claims QUEUED RPA submissions.
#
# Required secrets (set via `fly secrets set ...`):
#   HOGWARTS_API_BASE       e.g. https://ed.databayt.org
#   HOGWARTS_API_TOKEN      SchoolApiToken plaintext with scope `compliance.rpa_claim`
#   WORKER_ID               e.g. fly-adek-rpa-01
#   POLL_INTERVAL_MS        default 30000

app = "hogwarts-adek-rpa"
primary_region = "fra" # Frankfurt — close-ish to UAE eSIS endpoints

[build]
  dockerfile = "Dockerfile"

[env]
  POLL_INTERVAL_MS = "30000"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
