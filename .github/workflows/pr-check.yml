name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  # package.json `postinstall` runs `prisma generate`, which reads
  # env.DATABASE_URL via env.mjs. Without these, EVERY job's
  # `pnpm install --frozen-lockfile` step fails with
  # `PrismaConfigEnvError: Missing required environment variable: DATABASE_URL`
  # before any real work runs. Set at workflow level so all 4 jobs
  # (typecheck, lint, tests, build) inherit the placeholders.
  DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
  DIRECT_URL: ${{ secrets.DIRECT_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
  AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'placeholder-secret-for-build' }}
  AUTH_URL: ${{ secrets.AUTH_URL || 'http://localhost:3000' }}
  SKIP_ENV_VALIDATION: true

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: TypeScript Check
        run: pnpm tsc --noEmit
        env:
          # tsc on this codebase's type graph exceeds the default ~2GB heap and
          # OOMs on CI runners (#351); ubuntu-latest has 16GB, match local 8GB.
          NODE_OPTIONS: --max-old-space-size=8192

  license-headers:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check SSPL License Headers
        run: bash scripts/check-license-headers.sh

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: i18n dictionary parity
        # Cheap fail-fast: en/ar key drift or untranslated [AR]/[EN]
        # placeholders. Same engine as the vitest dictionary-parity guard.
        run: pnpm i18n:check

      - name: Run Tests with Coverage
        # `--` separator so --run/--coverage reach vitest instead of being
        # swallowed as pnpm options. (The script is `test`, not `tests` —
        # the old name made this job a silent no-op.)
        run: pnpm test -- --run --coverage

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Build
        run: pnpm build
        env:
          # Skip telemetry during build
          NEXT_TELEMETRY_DISABLED: 1
          # Provide required env vars for build
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/placeholder' }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET || 'placeholder-secret-for-build' }}
          AUTH_URL: ${{ secrets.AUTH_URL || 'http://localhost:3000' }}
          SKIP_ENV_VALIDATION: true

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'needs-integration-tests')
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run Integration Tests
        run: pnpm vitest --config vitest.config.integration.mts --run
        env:
          DATABASE_URL: ${{ secrets.NEON_INTEGRATION_DATABASE_URL }}

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, build, license-headers]
    if: always()
    steps:
      - name: Check Results
        run: |
          echo "## PR Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ needs.typecheck.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ needs.test.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| License Headers | ${{ needs.license-headers.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any check failed
        if: needs.typecheck.result != 'success' || needs.lint.result != 'success' || needs.test.result != 'success' || needs.build.result != 'success' || needs.license-headers.result != 'success'
        run: exit 1
